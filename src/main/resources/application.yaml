server:
  port: 8081
  shutdown: graceful
  compression:
    enabled: true
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 1000

spring:
  application:
    name: hmdp-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      timeout: 3s
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  ai:
    openai:
      base-url: ${AI_BASE_URL:https://api.henng.cn}
      api-key: ${AI_API_KEY:sk-31bbb402929a905f8dbf9ae662cb731c62cc8148e516fd58ad3c8ea02c06a31e}
      chat:
        options:
          model: ${AI_MODEL:gpt-5.4-mini}
          temperature: ${AI_TEMPERATURE:0.2}
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-v3}
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId}] - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true

hmdp:
  voucher-order:
    enabled: ${HMDP_VOUCHER_ORDER_ENABLED:true}
  redisson:
    enabled: ${REDISSON_ENABLED:true}
  ai:
    enabled: ${AI_ENABLED:true}
    memory-turns: ${AI_MEMORY_TURNS:6}
    memory-ttl-hours: ${AI_MEMORY_TTL_HOURS:12}
    context-compression:
      enabled: ${AI_CONTEXT_COMPRESSION_ENABLED:true}
      recent-turn-pairs: ${AI_CONTEXT_COMPRESSION_RECENT_TURN_PAIRS:4}
      soft-token-budget: ${AI_CONTEXT_COMPRESSION_SOFT_TOKEN_BUDGET:5000}
      hard-token-budget: ${AI_CONTEXT_COMPRESSION_HARD_TOKEN_BUDGET:6500}
      summary-trigger-message-count: ${AI_CONTEXT_COMPRESSION_SUMMARY_TRIGGER_MESSAGE_COUNT:18}
      summary-max-tokens: ${AI_CONTEXT_COMPRESSION_SUMMARY_MAX_TOKENS:1200}
      micro-compact-enabled: ${AI_CONTEXT_COMPRESSION_MICRO_COMPACT_ENABLED:true}
      micro-compact-keep-recent-tool-rounds: ${AI_CONTEXT_COMPRESSION_MICRO_COMPACT_KEEP_RECENT_TOOL_ROUNDS:2}
      long-term-memory-enabled: ${AI_CONTEXT_COMPRESSION_LONG_TERM_MEMORY_ENABLED:true}
      memory-top-k: ${AI_CONTEXT_COMPRESSION_MEMORY_TOP_K:6}
      summary-model: ${AI_CONTEXT_COMPRESSION_SUMMARY_MODEL:}
      compression-model: ${AI_CONTEXT_COMPRESSION_COMPRESSION_MODEL:}
      fact-min-confidence: ${AI_CONTEXT_COMPRESSION_FACT_MIN_CONFIDENCE:0.72}
      summary-tool-outcome-limit: ${AI_CONTEXT_COMPRESSION_SUMMARY_TOOL_OUTCOME_LIMIT:4}
      summary-rag-takeaway-limit: ${AI_CONTEXT_COMPRESSION_SUMMARY_RAG_TAKEAWAY_LIMIT:3}
      memory-expiry-days: ${AI_CONTEXT_COMPRESSION_MEMORY_EXPIRY_DAYS:30}
    knowledge-enabled: ${AI_KNOWLEDGE_ENABLED:true}
    knowledge-top-k: ${AI_KNOWLEDGE_TOP_K:4}
    default-conversation-prefix: agent-session
    rag-enabled: ${AI_RAG_ENABLED:true}
    rag-rebuild-on-startup: ${AI_RAG_REBUILD_ON_STARTUP:false}
    rag-store-file: ${AI_RAG_STORE_FILE:data/ai/hmdp-vector-store.json}
    rag-similarity-threshold: ${AI_RAG_SIMILARITY_THRESHOLD:0.62}
    blog-rag:
      enabled: ${AI_BLOG_RAG_ENABLED:true}
      recent-days: ${AI_BLOG_RAG_RECENT_DAYS:180}
      min-liked: ${AI_BLOG_RAG_MIN_LIKED:10}
      max-documents: ${AI_BLOG_RAG_MAX_DOCUMENTS:300}
      rerank-candidate-limit: ${AI_BLOG_RAG_RERANK_CANDIDATE_LIMIT:12}
    embedding:
      provider: ${AI_EMBEDDING_PROVIDER:dashscope}
      base-url: ${AI_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings}
      api-key: ${AI_EMBEDDING_API_KEY:sk-bc3d8649a600499eba38b96f21b2fb52}
      model: ${AI_EMBEDDING_MODEL:text-embedding-v3}
      local-dimensions: ${AI_LOCAL_EMBEDDING_DIMENSIONS:256}
    rerank:
      enabled: ${AI_RERANK_ENABLED:true}
      base-url: ${AI_RERANK_BASE_URL:https://dashscope.aliyuncs.com/compatible-api/v1/reranks}
      api-key: ${AI_RERANK_API_KEY:sk-bc3d8649a600499eba38b96f21b2fb52}
      model: ${AI_RERANK_MODEL:qwen3-rerank}
      top-n: ${AI_RERANK_TOP_N:5}
    restaurant-retrieval:
      enabled: ${AI_RESTAURANT_RETRIEVAL_ENABLED:true}
      rebuild-on-startup: ${AI_RESTAURANT_RETRIEVAL_REBUILD_ON_STARTUP:false}
      store-file: ${AI_RESTAURANT_RETRIEVAL_STORE_FILE:data/ai/shop-vector-store.json}
      similarity-threshold: ${AI_RESTAURANT_RETRIEVAL_SIMILARITY_THRESHOLD:0.30}
      candidate-limit: ${AI_RESTAURANT_RETRIEVAL_CANDIDATE_LIMIT:12}
      nearby-distance-limit-meters: ${AI_RESTAURANT_RETRIEVAL_NEARBY_DISTANCE_LIMIT_METERS:50000}
    baidu-map:
      enabled: ${AI_BAIDU_MAP_ENABLED:true}
      ak: ${AI_BAIDU_MAP_AK:nw1jp605gYga90yEGnmexgjwkWfZBlF2}
      geocoding-url: ${AI_BAIDU_MAP_GEOCODING_URL:https://api.map.baidu.com/geocoding/v3/}
      suggestion-url: ${AI_BAIDU_MAP_SUGGESTION_URL:https://api.map.baidu.com/place/v2/suggestion}
      place-search-url: ${AI_BAIDU_MAP_PLACE_SEARCH_URL:https://api.map.baidu.com/place/v2/search}
    planner-enabled: ${AI_PLANNER_ENABLED:true}
    planner-validation-enabled: ${AI_PLANNER_VALIDATION_ENABLED:true}
    recursive-tool-loop-enabled: ${AI_RECURSIVE_TOOL_LOOP_ENABLED:true}
    debug-user-id: ${AI_DEBUG_USER_ID:1}
    rate-limit:
      enabled: ${AI_RATE_LIMIT_ENABLED:true}
      window-seconds: ${AI_RATE_LIMIT_WINDOW_SECONDS:60}
      chat-max-requests: ${AI_RATE_LIMIT_CHAT_MAX_REQUESTS:30}
      stream-max-requests: ${AI_RATE_LIMIT_STREAM_MAX_REQUESTS:10}
    audit:
      enabled: ${AI_AUDIT_ENABLED:true}
      stream-key: ${AI_AUDIT_STREAM_KEY:hmdp:agent:audit}
      max-len: ${AI_AUDIT_STREAM_MAX_LEN:5000}
      include-answer: ${AI_AUDIT_INCLUDE_ANSWER:false}
